<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 627" width="1200" height="627">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#f5a524" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="627" fill="#0a0a0a"/>
  <rect width="1200" height="627" fill="url(#glow)"/>

  <!-- Subtle grid texture -->
  <g stroke="#161616" stroke-width="1" opacity="0.6">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="527" x2="1200" y2="527"/>
  </g>

  <!-- Top brand bar -->
  <text x="80" y="70" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="20" font-weight="700" fill="#ededed">sd-rescue</text>
  <text x="1120" y="70" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="16" fill="#888" text-anchor="end">github.com/ochias/sd-rescue</text>

  <!-- Headline -->
  <g font-family="-apple-system, 'Inter', 'Helvetica Neue', sans-serif" font-weight="700">
    <text x="80" y="240" font-size="76" fill="#ededed" letter-spacing="-2">Recover deleted photos</text>
    <text x="80" y="320" font-size="76" fill="#ededed" letter-spacing="-2">from a microSD.</text>
    <text x="80" y="400" font-size="76" fill="#f5a524" letter-spacing="-2">For free.</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="455" font-family="-apple-system, 'Inter', sans-serif" font-size="22" fill="#888">
    A 90-line bash script that wraps PhotoRec into a guided flow. macOS · MIT.
  </text>

  <!-- Terminal mock at bottom -->
  <g transform="translate(80, 495)">
    <rect width="1040" height="72" rx="10" fill="url(#card-gradient)" stroke="#222" stroke-width="1"/>
    <circle cx="22" cy="36" r="6" fill="#ff5f56"/>
    <circle cx="42" cy="36" r="6" fill="#ffbd2e"/>
    <circle cx="62" cy="36" r="6" fill="#27c93f"/>
    <text x="100" y="44" font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="22" fill="#ededed">
      <tspan fill="#4ade80">$</tspan> ./recover-sd.sh --no-image ~/Downloads/recovered
    </text>
  </g>
</svg>
